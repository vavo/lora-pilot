name: Build Windows Installer

on:
  push:
    branches:
      - main
      - feat/windows-wsl-installer
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Set release metadata
        shell: powershell
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $appVersion = $env:GITHUB_REF_NAME
          } else {
            $appVersion = "sha-$($env:GITHUB_SHA.Substring(0, 12))"
          }
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MANIFEST_URL=https://github.com/$($env:GITHUB_REPOSITORY)/releases/download/$appVersion/windows-runtime-manifest.json" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build launcher and installer
        shell: powershell
        run: .\packaging\windows\build-installer.ps1 -AppVersion $env:APP_VERSION -ManifestUrl $env:MANIFEST_URL

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/windows-installer/*

      - name: Publish installer release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows-installer/LoRAPilotSetup.exe
